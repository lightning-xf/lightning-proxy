name: lightning
description: "A Flutter Windows VPN client."
publish_to: 'none'
version: 1.0.0+1

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 256

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  state_notifier: 0.7.2+1
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  file_picker: ^8.3.3
  json_annotation: 4.8.1
  freezed_annotation: 2.4.1
  qr_flutter: 4.1.0
  url_launcher: ^6.2.5
  http: ^1.2.0
  connectivity_plus: ^7.1.1
  flutter_svg: ^2.0.9
  google_fonts: ^8.1.0
  intl: ^0.20.2
  package_info_plus: ^8.1.1
  device_info_plus: ^10.1.0
  crypto: ^3.0.7
  riverpod: ^2.5.1
  network_info_plus: ^7.0.0
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  hotkey_manager: ^0.2.3
  launch_at_startup: ^0.3.1
  windows_single_instance: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.4.8
  json_serializable: 6.7.1
  freezed: 2.4.7
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/windows/xray-core.exe
    - assets/windows/geoip.dat
    - assets/windows/geosite.dat
    - assets/windows/app_icon.ico
    - assets/windows/wintun.dll
